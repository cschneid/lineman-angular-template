<div id="home" class="row">
  <div class="large-6 large-offset-3">
    <h2>{{ title }}</h2>

    <h3>Available:</h3>
    <ul class="small-block-grid-2">
      <li ng-repeat="noot in noots">
        <a ng-click="add(noot.name)">{{ noot.name }}</a>
      </li>
    </ul>

    <h3>My Stack:</h3>
    <ul class="small-block-grid-2">
      <li ng-repeat="noot in stack">
        <a ng-click="remove(noot.name)">
          {{ noot.name }} (X)
        </a>
      </li>
    </ul>
  </div>
</div>
